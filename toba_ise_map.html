<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>鳥羽・伊勢イベントマップ</title>
  <link rel="preconnect" href="https://unpkg.com">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
  <style>
    :root {
      --bg: #f6f7fb;
      --panel: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #e5e7eb;
      --accent: #2563eb;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      --radius: 18px;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Hiragino Kaku Gothic ProN", Meiryo, sans-serif; color: var(--text); background: var(--bg); }
    body { display: grid; grid-template-rows: auto 1fr; }
    .header {
      padding: 18px 22px;
      background: rgba(255,255,255,.92);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--line);
      position: sticky;
      top: 0;
      z-index: 1000;
    }
    .title {
      display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
    }
    .title h1 { margin: 0; font-size: 24px; }
    .subtitle { color: var(--muted); font-size: 14px; }
    .layout {
      display: grid;
      grid-template-columns: 400px minmax(0, 1fr) 380px;
      gap: 16px;
      padding: 16px;
      min-height: 0;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      min-height: 0;
      overflow: hidden;
    }
    .sidebar, .details {
      display: grid;
      grid-template-rows: auto auto auto 1fr;
    }
    .section {
      padding: 16px;
      border-bottom: 1px solid var(--line);
    }
    .section:last-child { border-bottom: none; }
    .controls {
      display: grid;
      gap: 10px;
    }
    .search {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 14px;
      outline: none;
    }
    .filters {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .tabs {
      display: inline-flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .tab {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 13px;
      background: #fff;
      color: var(--muted);
      cursor: pointer;
      transition: .15s ease;
    }
    .tab.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
      box-shadow: 0 8px 18px rgba(37, 99, 235, .18);
    }
    select, .button {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 14px;
      background: #fff;
      cursor: pointer;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    .stat {
      background: #f8fafc;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
    }
    .stat .label { color: var(--muted); font-size: 12px; }
    .stat .value { font-weight: 700; font-size: 22px; margin-top: 6px; }
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 8px 10px;
      background: #fff;
      font-size: 12px;
      color: var(--muted);
    }
    .dot {
      width: 10px; height: 10px; border-radius: 999px; display: inline-block;
    }
    .list {
      overflow: auto;
      padding: 10px;
      display: grid;
      gap: 10px;
      align-content: start;
    }
    .item {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      background: #fff;
      cursor: pointer;
      transition: transform .15s ease, box-shadow .15s ease, border-color .15s ease;
    }
    .item:hover { transform: translateY(-1px); box-shadow: var(--shadow); }
    .item.active { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37, 99, 235, .12); }
    .item-title {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
      margin-bottom: 8px;
    }
    .item-title strong { font-size: 15px; line-height: 1.5; }
    .badge {
      white-space: nowrap;
      border-radius: 999px;
      padding: 5px 9px;
      font-size: 11px;
      font-weight: 700;
      color: #111827;
      background: #f3f4f6;
      border: 1px solid var(--line);
    }
    .meta { color: var(--muted); font-size: 12px; line-height: 1.6; }
    .flags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 10px;
    }
    .flag {
      border-radius: 999px;
      padding: 5px 8px;
      font-size: 11px;
      font-weight: 700;
      background: #eff6ff;
      color: #1d4ed8;
      border: 1px solid #bfdbfe;
    }
    #map { width: 100%; height: 100%; min-height: 60vh; }
    .map-wrap { overflow: hidden; position: relative; }
    .map-top {
      position: absolute;
      left: 12px; top: 12px;
      z-index: 700;
      background: rgba(255,255,255,.95);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 10px 12px;
      box-shadow: var(--shadow);
      font-size: 13px;
      color: var(--muted);
      max-width: 280px;
    }
    .details { overflow: hidden; }
    .details-body {
      overflow: auto;
      padding: 18px;
      display: grid;
      gap: 16px;
      align-content: start;
    }
    .detail-title h2 { margin: 0 0 6px 0; font-size: 24px; line-height: 1.4; }
    .detail-title p { margin: 0; color: var(--muted); line-height: 1.7; }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }
    .card {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 14px;
      padding: 14px;
    }
    .card .label { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
    .card .value { font-size: 14px; font-weight: 700; line-height: 1.6; word-break: break-word; }
    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .button {
      text-decoration: none;
      color: inherit;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
    }
    .button.primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .empty {
      color: var(--muted);
      line-height: 1.8;
      padding: 8px 2px;
    }

    .marker-pin {
      width: 18px;
      height: 18px;
      border-radius: 999px;
      border: 3px solid white;
      box-shadow: 0 4px 10px rgba(0,0,0,.25);
    }
    .leaflet-popup-content-wrapper {
      border-radius: 14px;
    }
    .popup-title {
      font-weight: 700;
      margin-bottom: 6px;
      line-height: 1.5;
    }
    .popup-meta {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
    }

    @media (max-width: 1200px) {
      .layout {
        grid-template-columns: 360px minmax(0, 1fr);
        grid-template-areas:
          "sidebar map"
          "details map";
      }
      .sidebar { grid-area: sidebar; }
      .map-wrap { grid-area: map; min-height: calc(100vh - 130px); }
      .details { grid-area: details; }
    }

    @media (max-width: 900px) {
      .layout {
        grid-template-columns: 1fr;
        grid-template-areas:
          "sidebar"
          "map"
          "details";
      }
      .map-wrap { min-height: 58vh; }
      .stats { grid-template-columns: repeat(3, 1fr); }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="title">
      <div>
        <h1>鳥羽・伊勢イベントマップ</h1>
        <div class="subtitle">各地点の詳細情報とマップを一画面で確認できるシングルページです。</div>
      </div>
    </div>
  </header>

  <main class="layout">
    <aside class="panel sidebar">
      <section class="section">
        <div class="controls">
          <input id="searchInput" class="search" type="text" placeholder="地点名・住所・パネル名で検索" />
          <div class="filters">
            <select id="categoryFilter">
              <option value="">すべてのカテゴリ</option>
            </select>
            <select id="tagFilter">
              <option value="">すべての条件</option>
              <option value="ゲームロケーション">ゲームロケーション</option>
              <option value="景品交換場所">景品交換場所</option>
              <option value="パネル">パネルあり</option>
            </select>
          </div>
          <div class="tabs" aria-label="並び順切替">
            <button id="sortByNo" class="tab active" type="button">一覧順</button>
            <button id="sortByRoute" class="tab" type="button">ルート順</button>
          </div>
        </div>
      </section>

      <section class="section">
        <div class="stats">
          <div class="stat">
            <div class="label">地点数</div>
            <div class="value" id="countAll">0</div>
          </div>
          <div class="stat">
            <div class="label">ゲーム</div>
            <div class="value" id="countGame">0</div>
          </div>
          <div class="stat">
            <div class="label">景品交換</div>
            <div class="value" id="countPrize">0</div>
          </div>
        </div>
      </section>

      <section class="section">
        <div class="legend" id="legend"></div>
      </section>

      <section class="list" id="locationList"></section>
    </aside>

    <section class="panel map-wrap">
      <div class="map-top">マーカーや左の一覧をクリックすると、右側に詳細が表示されます。</div>
      <div id="map"></div>
    </section>

    <aside class="panel details">
      <section class="section">
        <strong>詳細情報</strong>
      </section>
      <div class="details-body" id="detailsBody">
        <div class="empty">左の一覧、またはマップ上の地点を選択してください。</div>
      </div>
    </aside>
  </main>

      "港・船": "#2563eb",

      scrollWheelZoom: true

      maxZoom: 19,

    }).addTo(map);

    const detailsBody = document.getElementById('detailsBody');
    const searchInput = document.getElementById('searchInput');

    function colorFor(category) {
      return categoryColors[category] || "#64748b";
    }

    function truthyText(v) {
      return String(v || "").trim();
    }

    function hasGame(row) {
      return truthyText(row["ゲームロケーション"]) === "○";
    }

    function hasPrize(row) {
      return truthyText(row["景品交換場所"]) !== "";
    }

    function hasPanel(row) {
      return truthyText(row["パネル"]) !== "";
    }

    function makeMarkerIcon(color) {
      return L.divIcon({
        className: '',
        html: `<div class="marker-pin" style="background:${color}"></div>`,
        iconSize: [18, 18],
        iconAnchor: [9, 9],
        popupAnchor: [0, -8]
      });
    }

    function googleMapsUrl(row) {
      if (row["緯度"] && row["経度"]) {
        return `https://www.google.com/maps?q=${row["緯度"]},${row["経度"]}`;
      }
      return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(row["住所"] || row["地点名"])}`;
    }

    function detailCard(label, value) {
      return `
        <div class="card">
          <div class="label">${label}</div>
          <div class="value">${value || "―"}</div>
        </div>
      `;
    }

    function updateSortTabs() {
      sortByNoBtn.classList.toggle('active', sortMode === 'no');
      sortByRouteBtn.classList.toggle('active', sortMode === 'route');
    }

    function sortedRows(rows) {
      const copied = [...rows];
      if (sortMode === 'route') {
        return copied.sort((a, b) => {
          const ra = Number(a["ルート順"] ?? 9999);
          const rb = Number(b["ルート順"] ?? 9999);
          if (ra !== rb) return ra - rb;
          return Number(a["No"]) - Number(b["No"]);
        });
      }
      return copied.sort((a, b) => Number(a["No"]) - Number(b["No"]));
    }

      const flags = [
        row["ポイント"] ? `ポイント: ${row["ポイント"]}` : "",
        hasGame(row) ? "ゲームロケーション" : "",
        hasPrize(row) ? `景品交換: ${row["景品交換場所"]}` : "",
        hasPanel(row) ? `パネル: ${row["パネル"]}` : ""
      ].filter(Boolean).map(v => `<span class="flag">${v}</span>`).join("");

      detailsBody.innerHTML = `
        <div class="detail-title">
          <h2>${row["地点名"]}</h2>
          <p>${row["説明"] || ""}</p>
        </div>
        <div class="actions">
          <a class="button primary" href="${googleMapsUrl(row)}" target="_blank" rel="noopener noreferrer">Googleマップで開く</a>
        </div>
        <div class="grid">
          ${detailCard("カテゴリ", row["カテゴリ"])}
          ${detailCard("一覧順", row["No"])}
          ${detailCard("ルート順", row["ルート順"] === 99 ? "参考地点" : row["ルート順"])}
          ${detailCard("住所", row["住所"])}
          ${detailCard("ポイント", row["ポイント"])}
          ${detailCard("ゲームロケーション", row["ゲームロケーション"] || "―")}
          ${detailCard("景品交換場所", row["景品交換場所"] || "―")}
          ${detailCard("パネル", row["パネル"] || "―")}
          ${detailCard("緯度", row["緯度"] || "―")}
          ${detailCard("経度", row["経度"] || "―")}
        </div>
        <div>
          <div class="label" style="margin-bottom:8px;color:var(--muted);font-size:12px;">イベント情報</div>
          <div class="flags">${flags || '<span class="empty">特記事項はありません。</span>'}</div>
        </div>
      `;
    }

    function popupHtml(row) {
      return `
        <div class="popup-title">${row["地点名"]}</div>
        <div class="popup-meta">
          カテゴリ: ${row["カテゴリ"] || "―"}<br>
          ポイント: ${row["ポイント"] || "―"}<br>
          ${hasGame(row) ? "ゲームロケーション" : ""}
          ${hasPrize(row) ? "<br>景品交換: " + row["景品交換場所"] : ""}
          ${hasPanel(row) ? "<br>パネル: " + row["パネル"] : ""}
        </div>
      `;
    }

    function setActive(id) {
      currentId = id;
      document.querySelectorAll('.item').forEach(el => {
        el.classList.toggle('active', el.dataset.id === String(id));
      });
      const row = data.find(r => String(r["No"]) === String(id));
      if (!row) return;
      renderDetails(row);
      const marker = markers.get(String(id));
      if (marker) {
        map.flyTo(marker.getLatLng(), Math.max(map.getZoom(), 13), { duration: 0.5 });
        marker.openPopup();
      }
    }

    function renderList(rows) {
      const orderedRows = sortedRows(rows);
      rendered = orderedRows;
      listEl.innerHTML = "";
      if (!orderedRows.length) {
        listEl.innerHTML = `<div class="empty" style="padding:16px;">該当する地点がありません。</div>`;
        return;
      }
      orderedRows.forEach(row => {
        const el = document.createElement('button');
        el.className = 'item';
        el.dataset.id = row["No"];
        el.type = 'button';
        const flags = [
          row["ポイント"] ? `ポイント ${row["ポイント"]}` : "",
          hasGame(row) ? "ゲーム" : "",
          hasPrize(row) ? "景品交換" : "",
          hasPanel(row) ? "パネル" : ""
        ].filter(Boolean);
        el.innerHTML = `
          <div class="item-title">
            <strong>${row["地点名"]}</strong>
            <span class="badge" style="background:${colorFor(row["カテゴリ"])}22;border-color:${colorFor(row["カテゴリ"])}66;">${row["カテゴリ"]}</span>
          </div>
          <div class="meta">${row["住所"] || ""}</div>
          <div class="meta">${row["説明"] || ""}</div>
          <div class="meta">${sortMode === 'route' ? `ルート順: ${row["ルート順"] === 99 ? '参考地点' : row["ルート順"]}` : `一覧順: ${row["No"]}`}</div>
          <div class="flags">${flags.map(v => `<span class="flag">${v}</span>`).join("")}</div>
        `;
        el.addEventListener('click', () => setActive(row["No"]));
        listEl.appendChild(el);
      });
      if (currentId && rows.some(r => String(r["No"]) === String(currentId))) {
        setActive(currentId);
      }
    }

    function filteredData() {
      const q = searchInput.value.trim().toLowerCase();
      const cat = categoryFilter.value;
      const tag = tagFilter.value;
      return data.filter(row => {
        const text = [
          row["地点名"], row["住所"], row["カテゴリ"], row["説明"], row["パネル"]
        ].join(" ").toLowerCase();
        const matchQ = !q || text.includes(q);
        const matchCat = !cat || row["カテゴリ"] === cat;
        let matchTag = true;
        if (tag === "ゲームロケーション") matchTag = hasGame(row);
        if (tag === "景品交換場所") matchTag = hasPrize(row);
        if (tag === "パネル") matchTag = hasPanel(row);
        return matchQ && matchCat && matchTag;
      });
    }

    function updateStats() {
      countAll.textContent = data.length;
      countGame.textContent = data.filter(hasGame).length;
      countPrize.textContent = data.filter(hasPrize).length;
    }

    function updateMarkers(rows) {
      const visible = new Set(rows.map(r => String(r["No"])));
      markers.forEach((marker, id) => {
        if (visible.has(id)) {
          if (!map.hasLayer(marker)) marker.addTo(map);
        } else {
          if (map.hasLayer(marker)) map.removeLayer(marker);
        }
      });
      if (rows.length) {
        const latlngs = rows
          .filter(r => r["緯度"] !== "" && r["経度"] !== "")
          .map(r => [parseFloat(r["緯度"]), parseFloat(r["経度"])])
          .filter(v => !Number.isNaN(v[0]) && !Number.isNaN(v[1]));
        if (latlngs.length >= 2) {
          map.fitBounds(latlngs, { padding: [40, 40] });
        } else if (latlngs.length === 1) {
          map.setView(latlngs[0], 14);
        }
      }
    }

    function rerender() {
      const rows = filteredData();
      renderList(rows);
      updateMarkers(rows);
    }

    function initFilters() {
      const categories = [...new Set(data.map(r => r["カテゴリ"]).filter(Boolean))];
      categories.forEach(cat => {
        const opt = document.createElement('option');
        opt.value = cat;
        opt.textContent = cat;
        categoryFilter.appendChild(opt);
      });

      legendEl.innerHTML = categories.map(cat => `
        <span class="chip">
          <span class="dot" style="background:${colorFor(cat)}"></span>
          ${cat}
        </span>
      `).join("");
    }

    function initMarkers() {
      data.forEach(row => {
        const lat = parseFloat(row["緯度"]);
        const lng = parseFloat(row["経度"]);
        if (Number.isNaN(lat) || Number.isNaN(lng)) return;
        const marker = L.marker([lat, lng], {
          icon: makeMarkerIcon(colorFor(row["カテゴリ"]))
        });
        marker.bindPopup(popupHtml(row));
        marker.on('click', () => setActive(row["No"]));
        marker.addTo(map);
        markers.set(String(row["No"]), marker);
      });

      const latlngs = data
        .filter(r => r["緯度"] !== "" && r["経度"] !== "")
        .map(r => [parseFloat(r["緯度"]), parseFloat(r["経度"])])
        .filter(v => !Number.isNaN(v[0]) && !Number.isNaN(v[1]));
      if (latlngs.length) {
        map.fitBounds(latlngs, { padding: [40, 40] });
      }
    }

    searchInput.addEventListener('input', rerender);
    categoryFilter.addEventListener('change', rerender);
    tagFilter.addEventListener('change', rerender);
    sortByNoBtn.addEventListener('click', () => {
      sortMode = 'no';
      updateSortTabs();
      rerender();
    });
    sortByRouteBtn.addEventListener('click', () => {
      sortMode = 'route';
      updateSortTabs();
      rerender();
    });

    initFilters();
    updateSortTabs();
    updateStats();
    initMarkers();
    renderList(data);
    if (data.length) {
      setActive(data[0]["No"]);
    }
  </script>
</body>
</html>
